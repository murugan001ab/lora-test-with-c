; PlatformIO project config for the SX1262 P2P port (Arduino framework, ESP32)
;
; NOTE: I can only write into C:\Users\ADMIN\Desktop\Projects (that's the
; only directory my filesystem access is scoped to right now) -- your
; actual project lives at
; C:\Users\ADMIN\Documents\PlatformIO\Projects\lorawithc.
; Copy the include/ and src/ folders from here into that project (overwrite
; platformio.ini too if you don't already have one set up for esp32dev).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -std=gnu++17
build_unflags =
    -std=gnu++11
